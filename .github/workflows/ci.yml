name: CI Pipeline

on: 
    push:
        branches: [main]
    pull_request: 
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Installer Python
            uses: actions/setup-python@v5
            with:
              python-version: "3.12"
          - name: Installer les dépendances
            run: pip install -r requirements.txt
          - name: Lancer les tests
            run: pytest -v
